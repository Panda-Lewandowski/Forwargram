services:
  relaygram:
    build: .
    image: ${IMAGE_NAME:-relaygram:latest}
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - ${SOURCE_CHANNELS_HOST_FILE:-./source_channels.txt}:${SOURCE_CHANNELS_CONTAINER_FILE:-/app/source_channels.txt}:ro
    restart: unless-stopped
    stdin_open: true
    tty: true
